spring.application.name=blog

# ConfigurańŃo da DB (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/blog_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PWD:senha_do_banco}

# Configurań§es do Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JSON Web Token
api.security.jwt.secret=${JWT_ACCESS_SECRET:uma-chave-secreta-muito-segura-123}